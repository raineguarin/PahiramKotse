<!DOCTYPE html>
<html>
    <head>
        <title>User Register page</title>
        <link rel="stylesheet" href="../assets/global.css">
    </head>
    
    <body>
        <div class="name">
            <img src="../assets/logo.png" width="600px">
            <div class="desc">
                <h3> Rent a car now! </h3>
            </div>
        </div>
      
        <div class="userDetails">
            Name:
            <div class="nameInput">
                <input type="text">
            </div>
            
            Email:
            <div class="emailInput"> 
                <input type="text">
            </div>
            
            Number:
            <div class="numberInput">
                <input type="text">
            </div>
            
            Password:
            <div class="passInput">
                <input type="text">
            </div>

            Profile Image:
            <div class="imageInput">
                <input type="file" accept="image/*">
            </div>
            <br>
            <button class="proceed" onclick="location.href='cars.html'">Proceed</button>

        </div>
    </body>
</html>
