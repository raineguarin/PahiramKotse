<!DOCTYPE html>
<html>
<head>
    <title>Manage Vehicles</title>
    <link rel="stylesheet" href="../assets/manage-vehicles.css">
    <link rel="stylesheet" href="../assets/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <div class="name">
        <h1>Manage Vehicles</h1>
        <p>Admin</p>
    </div>

    <div class="boxcontainer">

        <div class="icons">
            <button><i class="fa-solid fa-plus"></i> Add</button>
            <button><i class="fa-solid fa-pen-to-square"></i> Edit</button>
            <button><i class="fa-solid fa-trash"></i> Delete</button>
            <button><i class="fa-solid fa-upload"></i> Upload Image</button>
        </div>

        <div class="vehicle-grid">

            <div class="vehicle-card">
                <img src="../assets/sedan.png" alt="Car Image">

                <div class="vehicle-info">
                    <h2>Car ID: 12512</h2>
                    <p><strong>Plate:</strong> KDA 8234</p>
                    <p><strong>Brand:</strong> Honda</p>
                    <p><strong>Capacity:</strong> 5-Seater</p>
                    <p><strong>Availability:</strong> Available</p>
                    <p><strong>Status:</strong> Rented</p>
                </div>
            </div>

            <div class="vehicle-card">
                <img src="../assets/suv.png" alt="Car Image">

                <div class="vehicle-info">
                    <h2>Car ID: 22341</h2>
                    <p><strong>Plate:</strong> KDB 5678</p>
                    <p><strong>Brand:</strong> Toyota</p>
                    <p><strong>Capacity:</strong> 7-Seater</p>
                    <p><strong>Availability:</strong> In Maintenance</p>
                    <p><strong>Status:</strong> Not Rented</p>
                </div>
            </div>

        </div>
    </div>

    <footer>
        <div class="footerContainer">
            <a href="manage-users.html" class="disable-link">Manage Users</a>
            <a href="manage-vehicles.html" class="disable-link">Manage Vehicles</a>
            <a href="manage-reservations.html" class="disable-link">Manage Reservations</a>
        </div>
    </footer>

</body>
</html>
